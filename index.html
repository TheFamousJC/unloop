<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnLoop - Anti-Algorithm Sandbox</title>
    <style>
        /* Modern, minimal dark styling - cozy library vibe */
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-color: #a78bfa;
            --accent-hover: #c084fc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        /* SCREENS */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .mood-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 2rem;
        }

        @media (min-width: 600px) {
            .mood-buttons {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .btn-mood {
            background-color: var(--card-bg);
            border: 2px solid #2e2e33;
            color: var(--text-color);
            padding: 25px 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-mood:hover {
            border-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .btn-mood span {
            display: block;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        /* The Three-Card Flight */
        .flight-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 2rem;
        }

        @media (min-width: 600px) {
            .flight-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #2e2e33;
            border-radius: 16px;
            padding: 24px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 200px;
        }

        .card:hover {
            border-color: var(--accent-color);
            transform: translateY(-4px);
        }

        .card-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0 0 20px 0;
            line-height: 1.4;
        }

        /* Action Launch Button inside the card */
        .btn-launch {
            background-color: #2e2e33;
            color: var(--text-color);
            border: 1px solid #3f3f46;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            display: block;
        }

        .card:hover .btn-launch {
            background-color: var(--accent-color);
            color: #121214;
            border-color: var(--accent-color);
        }

        .back-button {
            background: none;
            border: 1px solid #2e2e33;
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.2s;
        }

        .back-button:hover {
            background-color: #2e2e33;
        }

        /* SCREEN 3: The Deep Dive Overlay (In-App Player Box) */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 20, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .overlay.active {
            display: flex;
        }

        .overlay-content {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 650px;
            border-radius: 20px;
            border: 1px solid #2e2e33;
            padding: 24px;
            position: relative;
            box-sizing: border-box;
        }

        .btn-close {
            position: absolute;
            top: -45px;
            right: 0;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 2rem;
            cursor: pointer;
        }

        .btn-close:hover {
            color: var(--text-color);
        }

        .embed-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            margin-bottom: 15px;
        }

        .embed-container #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
    <!-- Load the official authorized YouTube player frame API -->
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <div class="container">
        <!-- HEADER -->
        <h1>UnLoop</h1>
        <p class="subtitle">An antidote to your comfort bubble.</p>

        <!-- SCREEN 1: Mood Entry -->
        <div id="screen-entry" class="screen active">
            <p>What kind of shift does your brain need right now?</p>
            <div class="mood-buttons">
                <button class="btn-mood" onclick="selectMood('wind_down')">
                    <span>🌿</span>Wind Down
                </button>
                <button class="btn-mood" onclick="selectMood('wake_up')">
                    <span>⚡</span>Wake Up
                </button>
                <button class="btn-mood" onclick="selectMood('surprise_me')">
                    <span>🎲</span>Surprise Me
                </button>
            </div>
        </div>

        <!-- SCREEN 2: The Three-Card Flight -->
        <div id="screen-flight" class="screen">
            <p id="flight-intro" style="color: var(--text-muted); font-size: 1.1rem;"></p>
            <div class="flight-grid" id="flight-items">
                <!-- Dynamic Flight Cards load here -->
            </div>
            <div>
                <button class="back-button" onclick="goHome()">← Back to Moods</button>
            </div>
        </div>
    </div>

    <!-- SCREEN 3: The Deep Dive In-App Overlay -->
    <div id="dive-overlay" class="overlay">
        <div class="overlay-content">
            <button class="btn-close" onclick="closeDive()">×</button>
            <div class="embed-container">
                <!-- The API will dynamically control the YouTube video inside this element -->
                <div id="youtube-player"></div>
            </div>
            <h3 id="dive-title" style="margin-top: 15px; margin-bottom: 5px; text-align: left;">Title</h3>
            <p id="dive-desc" style="color: var(--text-muted); font-size: 0.95rem; margin-top: 5px; text-align: left;">Description</p>
        </div>
    </div>

    <script>
        // GLOBAL YT PLAYER CONTROL VARIABLES
        let ytPlayer;
        let isApiReady = false;

        // Our system database utilizing raw YouTube video IDs 
        const contentDatabase = {
            wind_down: [
                {
                    tag: "Art Restoration",
                    title: "Baumgartner Art Restoration",
                    desc: "Watch a master conservator painstakingly bring a beautiful oil painting back to life in therapeutic silence.",
                    videoId: "32SBBSNpwSE"
                },
                {
                    tag: "Bushcraft Cabin",
                    title: "My Self Reliance - Alone in the Woods",
                    desc: "Quiet, satisfying log cabin living and primitive building deep in the Canadian wilderness.",
                    videoId: "sG5fSCelTfQ"
                },
                {
                    tag: "Ambient Escape",
                    title: "Moby - Long Ambient Sounds",
                    desc: "Immersive, slow synthesizer drone tracks designed to help you breathe, focus, and wind down.",
                    videoId: "YXO6DwiupIc"
                }
            ],
            wake_up: [
                {
                    tag: "Retro Tech",
                    title: "1890s Giant Orchestrions",
                    desc: "Explore a massive, mind-blowing mechanical self-playing instrument that operates 20 acoustic instruments at once.",
                    videoId: "L1eM9pYqS-Q"
                },
                {
                    tag: "Plant Technology",
                    title: "Mushroom Modular Synthesizers",
                    desc: "Fascinating setups converting the tiny electrical bio-rhythms of real forest fungi into lush synth music.",
                    videoId: "916Iva8llvE"
                },
                {
                    tag: "Macro Science",
                    title: "Beautiful Chemistry Crystal Growth",
                    desc: "Spectacular, high-definition time-lapses of chemical precipitation reactions forming crystals.",
                    videoId: "HSlQGFNstg0"
                }
            ],
            surprise_me: [
                {
                    tag: "British Comedy",
                    title: "Taskmaster S1 Episode 1",
                    desc: "A full episode of classic British panel comedy where comedians compete in utterly pointless, hilarious challenges.",
                    videoId: "v4YhsooE5xY"
                },
                {
                    tag: "Classic Restoration",
                    title: "Odd Tinkering - Restoring a PSone",
                    desc: "Watch a yellowed, broken, and dirty retro console get completely taken apart, cleaned, and perfectly rebuilt.",
                    videoId: "7t4KIYOipQM"
                },
                {
                    tag: "Urban Foraging",
                    title: "London Wilderness Food Foraging",
                    desc: "A fascinating look at the edible, medicinal plants growing in plain sight along urban streets and historic alleyways.",
                    videoId: "48B1_kY2sfI"
                }
            ]
        };

        // Initialize YouTube Player Frame safely once Google API finishes script load
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('youtube-player', {
                height: '100%',
                width: '100%',
                videoId: '', // start with an empty placeholder
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1
                }
            });
            isApiReady = true;
        }

        // App Navigation Logic
        function selectMood(mood) {
            document.getElementById('screen-entry').classList.remove('active');
            document.getElementById('screen-flight').classList.add('active');
            
            const intros = {
                wind_down: "🌿 Settle in. Here is your daily decompression flight...",
                wake_up: "⚡ Wake up your curiosity. Try one of these three rabbit holes...",
                surprise_me: "🎲 Roll the dice. Here is your sharp, unpredictable pattern-interrupt..."
            };
            document.getElementById('flight-intro').innerText = intros[mood];
            
            const container = document.getElementById('flight-items');
            container.innerHTML = ''; 
            
            const items = contentDatabase[mood];
            items.forEach((item, index) => {
                const cardHTML = `
                    <div class="card" onclick="openDive('${mood}', ${index})">
                        <div>
                            <div class="card-tag">${item.tag}</div>
                            <h3 class="card-title">${item.title}</h3>
                            <p class="card-desc">${item.desc}</p>
                        </div>
                        <span class="btn-launch">Play In-App →</span>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function goHome() {
            document.getElementById('screen-flight').classList.remove('active');
            document.getElementById('screen-entry').classList.add('active');
        }

        // Open Dive: Control and display video within our custom dark overlay
        function openDive(mood, index) {
            const item = contentDatabase[mood][index];
            document.getElementById('dive-title').innerText = item.title;
            document.getElementById('dive-desc').innerText = item.desc;
            
            // Show the overlay
            document.getElementById('dive-overlay').classList.add('active');
            
            // Load and play the video inside the frame automatically
            if (isApiReady && ytPlayer) {
                ytPlayer.loadVideoById(item.videoId);
            }
        }

        // Close and stop video completely so sound stops playing
        function closeDive() {
            document.getElementById('dive-overlay').classList.remove('active');
            if (ytPlayer && ytPlayer.stopVideo) {
                ytPlayer.stopVideo();
            }
        }
    </script>
</body>
</html>
