<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnLoop - The Active Antidote</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-color: #a78bfa;
            --accent-hover: #c084fc;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Diagnostic Quiz Styles */
        .quiz-container {
            background-color: var(--card-bg);
            border: 1px solid #2e2e33;
            border-radius: 16px;
            padding: 30px;
            text-align: left;
            margin-top: 2rem;
        }

        .quiz-question {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #222226;
            border: 1px solid #3f3f46;
            color: var(--text-color);
            padding: 15px 20px;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--accent-color);
            background-color: #2a2a30;
        }

        /* Flight Grid Styles */
        .flight-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 2rem;
        }

        @media (min-width: 600px) {
            .flight-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #2e2e33;
            border-radius: 16px;
            padding: 24px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 200px;
        }

        .card:hover {
            border-color: var(--accent-color);
            transform: translateY(-4px);
        }

        .card-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-color);
            font-weight: bold;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0 0 20px 0;
            line-height: 1.4;
        }

        .btn-launch {
            background-color: #2e2e33;
            color: var(--text-color);
            border: 1px solid #3f3f46;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            display: block;
        }

        .card:hover .btn-launch {
            background-color: var(--accent-color);
            color: #121214;
            border-color: var(--accent-color);
        }

        .back-button {
            background: none;
            border: 1px solid #2e2e33;
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.2s;
        }

        .back-button:hover {
            background-color: #2e2e33;
        }

        /* Overlay UI */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(18, 18, 20, 0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .overlay.active {
            display: flex;
        }

        .overlay-content {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 650px;
            border-radius: 20px;
            border: 1px solid #2e2e33;
            padding: 24px;
            position: relative;
            box-sizing: border-box;
        }

        .btn-close {
            position: absolute;
            top: -45px;
            right: 0;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 2rem;
            cursor: pointer;
        }

        .btn-close:hover {
            color: var(--text-color);
        }

        .embed-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
            margin-bottom: 15px;
        }

        .embed-container #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <div class="container">
        <h1>UnLoop</h1>
        <p class="subtitle">An active antidote to your algorithmic loop.</p>

        <!-- SCREEN 1: The Diagnostic Quiz -->
        <div id="screen-quiz" class="screen active">
            <div class="quiz-container">
                <div class="quiz-question">Diagnose the Trap: What is your current algorithm feeding you too much of right now?</div>
                <div class="quiz-options">
                    <button class="option-btn" onclick="applyAntidote('fast_digital')">
                        📱 Fast-paced short videos, memes, and tech updates (Overstimulated Loop)
                    </button>
                    <button class="option-btn" onclick="applyAntidote('heavy_theory')">
                        📈 Corporate productivity hacks, data spreadsheets, and news (Workaholic Loop)
                    </button>
                    <button class="option-btn" onclick="applyAntidote('passive_predictable')">
                        📺 Highly predictable comfort shows or radio playlists (Passive Rut Loop)
                    </button>
                </div>
            </div>
        </div>

        <!-- SCREEN 2: The Antidote Flight -->
        <div id="screen-flight" class="screen">
            <p id="flight-intro" style="color: var(--text-muted); font-size: 1.1rem; text-align: left; font-style: italic;"></p>
            <div class="flight-grid" id="flight-items">
                <!-- Calculated Antidote Cards load here dynamically -->
            </div>
            <div>
                <button class="back-button" onclick="goHome()">← Diagnose a New Loop</button>
            </div>
        </div>
    </div>

    <!-- SCREEN 3: Deep Dive In-App Overlay -->
    <div id="dive-overlay" class="overlay">
        <div class="overlay-content">
            <button class="btn-close" onclick="closeDive()">×</button>
            <div class="embed-container">
                <div id="youtube-player"></div>
            </div>
            <h3 id="dive-title" style="margin-top: 15px; margin-bottom: 5px; text-align: left;">Title</h3>
            <p id="dive-desc" style="color: var(--text-muted); font-size: 0.95rem; margin-top: 5px; text-align: left;">Description</p>
        </div>
    </div>

    <script>
        let ytPlayer;
        let isApiReady = false;
        let activeFlight = [];

        // OUR DYNAMIC VECTOR CONTENT DATABASE
        // Every content item has mathematical vibe coordinates: [Pace, Complexity, Physicality] from 1 to 10.
        const masterDatabase = [
            {
                tag: "Tactile Restoration",
                title: "Baumgartner Art Restoration",
                desc: "The absolute opposite of digital chaos: a master conservator spending hours silently repairing a physical 400-year-old canvas.",
                videoId: "32SBBSNpwSE",
                coordinates: [2, 7, 10] // Slow pace, medium complexity, highly physical
            },
            {
                tag: "Nature Survival",
                title: "My Self Reliance Log Cabin",
                desc: "Cleanse your overstimulated mind by watching a man build a physical shelter in the silent Canadian woods.",
                videoId: "sG5fSCelTfQ",
                coordinates: [1, 3, 10] // Very slow, simple, highly physical
            },
            {
                tag: "Ambient Escape",
                title: "Moby - Infinite Ambient Drones",
                desc: "An ambient synthesizer track constructed with long, evolving waves of sound to slow your racing brain down.",
                videoId: "YXO6DwiupIc",
                coordinates: [1, 4, 2] // Slow, simple, low physicality (digital sound)
            },
            {
                tag: "Absurdist Humor",
                title: "Taskmaster - Chaotic Creativity",
                desc: "The antidote to dry spreadsheets and productivity culture: brilliant adults wasting intellectual energy on pointless tasks.",
                videoId: "v4YhsooE5xY",
                coordinates: [7, 5, 6] // Fast pace, medium complexity, semi-physical
            },
            {
                tag: "Obscure Science",
                title: "Mushroom Bio-Synthesizers",
                desc: "Break out of simple playlists. Watch a creator turn the electrical voltages of a wild mushroom into modular music.",
                videoId: "916Iva8llvE",
                coordinates: [4, 8, 5] // Moderate pace, complex, semi-physical
            },
            {
                tag: "Macro Chemistry",
                title: "Beautiful Chemistry Precipitation",
                desc: "Visually explosive, high-energy closeups of chemical molecules crashing together. Highly stimulating and physical.",
                videoId: "HSlQGFNstg0",
                coordinates: [8, 8, 8] // Fast, highly complex, highly physical
            }
        ];

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('youtube-player', {
                height: '100%',
                width: '100%',
                videoId: '',
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1
                }
            });
            isApiReady = true;
        }

        // THE ANTIDOTE ENGINE: This calculates mathematical opposites to the user's chosen trap!
        function applyAntidote(trapType) {
            let targetCoordinates = [];
            let explanation = "";

            if (trapType === 'fast_digital') {
                // The Trap: High Speed, Video, Digital [10, 5, 1]
                // The Antidote: Extremely Slow, Highly Physical, Mindful content.
                targetCoordinates = [1, 3, 10]; 
                explanation = "Your diagnosis: Digital Overstimulation. Administering antidote: highly tactile, slow-paced physical processes to ground your attention.";
            } else if (trapType === 'heavy_theory') {
                // The Trap: Highly analytical, corporate, abstract data [6, 10, 2]
                // The Antidote: Creative, Absurd, Highly physical, or visual play.
                targetCoordinates = [8, 5, 8];
                explanation = "Your diagnosis: Analytical Rut. Administering antidote: highly irrational, visually stimulating, and creative expressions.";
            } else if (trapType === 'passive_predictable') {
                // The Trap: Static, highly predictable media comfort zone [2, 2, 2]
                // The Antidote: Highly complex, experimental, pattern-breaking concepts.
                targetCoordinates = [5, 10, 5];
                explanation = "Your diagnosis: Passive Comfort Loop. Administering antidote: high-concept, experimental, and hyper-complex scientific synthesis.";
            }

            // Calculate 'distance' from target and sort the database to find the closest matches
            const calculatedAntidotes = masterDatabase.map(item => {
                const distance = Math.sqrt(
                    Math.pow(item.coordinates[0] - targetCoordinates[0], 2) +
                    Math.pow(item.coordinates[1] - targetCoordinates[1], 2) +
                    Math.pow(item.coordinates[2] - targetCoordinates[2], 2)
                );
                return { ...item, distance: distance };
            }).sort((a, b) => a.distance - b.distance);

            // Take the top three best mathematical antidotes
            activeFlight = calculatedAntidotes.slice(0, 3);

            // Transition Screens
            document.getElementById('screen-quiz').classList.remove('active');
            document.getElementById('screen-flight').classList.add('active');
            document.getElementById('flight-intro').innerText = explanation;

            // Render the cards
            const container = document.getElementById('flight-items');
            container.innerHTML = '';
            
            activeFlight.forEach((item, index) => {
                const cardHTML = `
                    <div class="card" onclick="openDive(${index})">
                        <div>
                            <div class="card-tag">${item.tag}</div>
                            <h3 class="card-title">${item.title}</h3>
                            <p class="card-desc">${item.desc}</p>
                        </div>
                        <span class="btn-launch">Play Antidote →</span>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function goHome() {
            document.getElementById('screen-flight').classList.remove('active');
            document.getElementById('screen-quiz').classList.add('active');
        }

        function openDive(index) {
            const item = activeFlight[index];
            document.getElementById('dive-title').innerText = item.title;
            document.getElementById('dive-desc').innerText = item.desc;
            document.getElementById('dive-overlay').classList.add('active');
            
            if (isApiReady && ytPlayer) {
                ytPlayer.loadVideoById(item.videoId);
            }
        }

        function closeDive() {
            document.getElementById('dive-overlay').classList.remove('active');
            if (ytPlayer && ytPlayer.stopVideo) {
                ytPlayer.stopVideo();
            }
        }
    </script>
</body>
</html>
